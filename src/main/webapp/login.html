<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FoodHub | Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
	href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
	rel="stylesheet">

<link rel="stylesheet" href="css/login.css">

</head>

<body>

	<div class="background-circle circle1"></div>
	<div class="background-circle circle2"></div>
	<div class="background-circle circle3"></div>

	<div class="container">

		<!-- Left Side -->

		<div class="left-panel">

			<div class="overlay"></div>

			<div class="content">

				<h1 class="logo">🍽 FoodHub</h1>

				<h2>Welcome Back!</h2>

				<p>Discover delicious meals from the best restaurants around
					you. Login and continue your food journey.</p>

				<a href="register.html" class="outline-btn"> Create Account </a>

			</div>

		</div>


		<!-- Right Side -->

		<div class="right-panel">

			<div class="login-card">

				<h2>Login</h2>

				<p>Sign in to your account</p>

				<form action="login" method="post">

					<div class="input-box">

						<label>Email</label> <input type="email" name="email"
							placeholder="Enter your email" required>

					</div>

					<div class="input-box">

						<label>Password</label> <input type="password" name="password"
							placeholder="Create password" required>

					</div>

					<div class="remember">

						<label> <input type="checkbox"> Remember Me

						</label> <a href="forgotPassword.jsp">Forgot Password?</a>

					</div>

					<button class="login-btn">Login</button>

				</form>

				<div class="divider">OR</div>

				<div class="bottom-text">

					Don't have an account? <a href="register.html"> Register </a>

				</div>

			</div>

		</div>

	</div>

</body>
</html>
