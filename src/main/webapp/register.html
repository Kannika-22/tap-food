<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FoodHub | Register</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
	href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
	rel="stylesheet">

<link rel="stylesheet" href="css/register.css">

</head>

<body class="register-page">

	<div class="background-circle circle1"></div>
	<div class="background-circle circle2"></div>
	<div class="background-circle circle3"></div>

	<div class="container">

		<!-- Left Side -->

		<div class="left-panel">

			<div class="overlay"></div>

			<div class="content">

				<h1 class="logo">🍽 FoodHub</h1>

				<h2>Join FoodHub Today!</h2>

				<p>Create your account and enjoy thousands of delicious dishes,
					exclusive offers and fast doorstep delivery.</p>

				<a href="login.html" class="outline-btn"> Login Now </a>

			</div>

		</div>


		<!-- Right Side -->

		<div class="right-panel">

			<div class="login-card">

				<h2>Create Account</h2>

				<p>Create your FoodHub account</p>

				<form action="register" method="post">

					<div class="input-box">

						<label>Name</label> <input type="text" name="name"
							placeholder="Enter your full name" required>

					</div>

					<div class="input-box">

						<label>Email Address</label> <input type="email" name="email"
							placeholder="Enter your email" required>

					</div>

					<div class="input-box">

						<label>Address</label> <input type="text" name="address"
							placeholder="Enter your address" required>

					</div>

					<div class="input-box role-box">

						<label>Select Role</label>

						<div class="role-dropdown">

							<div class="role-selected" id="roleSelected">

								<span id="roleText">Choose Your Role</span> <span
									class="role-arrow">&#9662;</span>

							</div>

							<div class="role-options" id="roleOptions">

								<div class="role-option" data-value="Customer">Customer</div>

								<div class="role-option" data-value="DeliveryAgent">
									Delivery Agent</div>

								<div class="role-option" data-value="Restaurant">
									Restaurant</div>

								<div class="role-option" data-value="SuperAdmin">Super
									Admin</div>

							</div>

							<input type="hidden" id="roleValue" name="role">

						</div>

					</div>

					<div class="input-box">

						<label>Password</label> <input type="password" name="password"
							placeholder="Create password" required>

					</div>

					<div class="input-box">

						<label>Confirm Password</label> <input type="password"
							name="confirmPassword" placeholder="Confirm password" required>

					</div>

					<div class="remember">

						<label> <input type="checkbox"> I agree to the
							Terms & Conditions

						</label>

					</div>

					<button type="submit" class="login-btn">Create Account</button>

				</form>

				<div class="divider">OR</div>

				<div class="bottom-text">

					Already have an account? <a href="login.html"> Login </a>

				</div>

			</div>

		</div>

	</div>

	<script>
		const roleSelected = document.getElementById("roleSelected");

		const roleOptions = document.getElementById("roleOptions");

		const roleText = document.getElementById("roleText");

		const roleValue = document.getElementById("roleValue");

		roleSelected.addEventListener("click", function(e) {

			e.stopPropagation();

			roleSelected.classList.toggle("active");

			if (roleOptions.classList.contains("show")) {

				roleOptions.classList.remove("show");

			} else {

				roleOptions.classList.add("show");

			}

		});

		document.querySelectorAll(".role-option").forEach(function(option) {

			option.addEventListener("click", function(e) {

				e.stopPropagation();

				roleText.textContent = this.textContent;

				roleSelected.classList.add("selected");

				roleValue.value = this.dataset.value;

				roleSelected.classList.remove("active");

				roleOptions.classList.remove("show");

			});

		});

		document.addEventListener("click", function() {

			roleSelected.classList.remove("active");

			roleOptions.classList.remove("show");

		});
	</script>

</body>
</html>
